name: Build Windows packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            python_embed: python-3.12.8-embed-amd64.zip
            python_dir: python-x64
          - arch: x86
            python_embed: python-3.12.8-embed-win32.zip
            python_dir: python-x86
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Prune frontend dev dependencies
        working-directory: frontend
        run: npm prune --omit=dev

      - name: Prepare portable Python (${{ matrix.arch }})
        working-directory: backend
        run: |
          Invoke-WebRequest "https://www.python.org/ftp/python/3.12.8/${{ matrix.python_embed }}" -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath ${{ matrix.python_dir }}
          Remove-Item python-embed.zip
          # Enable site-packages and put the backend package on sys.path
          # (._pth relative entries resolve against the python.exe directory).
          $pth = Get-ChildItem ${{ matrix.python_dir }}\python*._pth | Select-Object -First 1
          (Get-Content $pth.FullName) -replace "#import site", "import site" | Set-Content $pth.FullName
          Add-Content $pth.FullName ".."
          Invoke-WebRequest "https://bootstrap.pypa.io/get-pip.py" -OutFile get-pip.py
          .\${{ matrix.python_dir }}\python.exe get-pip.py --no-warn-script-location
          Remove-Item get-pip.py
          .\${{ matrix.python_dir }}\python.exe -m pip install --no-warn-script-location -r requirements.txt
          .\${{ matrix.python_dir }}\python.exe -c "import platform; print('python', platform.architecture()[0])"

      - name: Bundle ffmpeg
        continue-on-error: true
        run: |
          Invoke-WebRequest "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          $bin = Get-ChildItem ffmpeg-tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path vendor\ffmpeg\windows\bin | Out-Null
          Copy-Item $bin.FullName vendor\ffmpeg\windows\bin\
          Copy-Item (Join-Path $bin.DirectoryName "ffprobe.exe") vendor\ffmpeg\windows\bin\
          Remove-Item ffmpeg.zip
          Remove-Item ffmpeg-tmp -Recurse -Force

      - name: Smoke test backend on portable Python
        working-directory: backend
        env:
          MRC_HARDWARE_MODE: mock
        run: |
          .\${{ matrix.python_dir }}\python.exe -c "from mrc_backend.api import create_app; create_app(); print('backend import OK')"
          .\${{ matrix.python_dir }}\python.exe -m pip install --no-warn-script-location pytest
          .\${{ matrix.python_dir }}\python.exe -m pytest tests -q

      - name: Create archive
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          Set-Location (Split-Path $workspace -Parent)
          $repoName = Split-Path $workspace -Leaf
          7z a "$workspace\MRC-windows-${{ matrix.arch }}.zip" $repoName `
            "-xr!.git" "-xr!.github" "-xr!__pycache__" "-xr!.pytest_cache" `
            "-xr!.npm-cache" "-xr!.venv" "-xr!.venv32" "-xr!MRC-windows-*.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: MRC-windows-${{ matrix.arch }}
          path: MRC-windows-${{ matrix.arch }}.zip
          compression-level: 0

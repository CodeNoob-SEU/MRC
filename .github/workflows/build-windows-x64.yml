name: Build Windows x64 package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Prune frontend dev dependencies
        working-directory: frontend
        run: npm prune --omit=dev

      - name: Prepare portable Python (x64)
        working-directory: backend
        run: |
          $version = "3.12.8"
          Invoke-WebRequest "https://www.python.org/ftp/python/$version/python-$version-embed-amd64.zip" -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath python-x64
          Remove-Item python-embed.zip
          # Enable site-packages and put the backend package on sys.path
          # (._pth relative entries resolve against the python.exe directory).
          $pth = Get-ChildItem python-x64\python*._pth | Select-Object -First 1
          (Get-Content $pth.FullName) -replace "#import site", "import site" | Set-Content $pth.FullName
          Add-Content $pth.FullName ".."
          Invoke-WebRequest "https://bootstrap.pypa.io/get-pip.py" -OutFile get-pip.py
          .\python-x64\python.exe get-pip.py --no-warn-script-location
          Remove-Item get-pip.py
          .\python-x64\python.exe -m pip install --no-warn-script-location -r requirements.txt

      - name: Bundle ffmpeg
        continue-on-error: true
        run: |
          Invoke-WebRequest "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          $bin = Get-ChildItem ffmpeg-tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path vendor\ffmpeg\windows\bin | Out-Null
          Copy-Item $bin.FullName vendor\ffmpeg\windows\bin\
          Copy-Item (Join-Path $bin.DirectoryName "ffprobe.exe") vendor\ffmpeg\windows\bin\
          Remove-Item ffmpeg.zip
          Remove-Item ffmpeg-tmp -Recurse -Force

      - name: Smoke test backend on portable Python
        working-directory: backend
        env:
          MRC_HARDWARE_MODE: mock
        run: |
          .\python-x64\python.exe -c "from mrc_backend.api import create_app; create_app(); print('backend import OK')"
          .\python-x64\python.exe -m pip install --no-warn-script-location pytest
          .\python-x64\python.exe -m pytest tests -q

      - name: Create archive
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          Set-Location (Split-Path $workspace -Parent)
          $repoName = Split-Path $workspace -Leaf
          7z a "$workspace\MRC-windows-x64.zip" $repoName `
            "-xr!.git" "-xr!.github" "-xr!__pycache__" "-xr!.pytest_cache" `
            "-xr!.npm-cache" "-xr!.venv" "-xr!.venv32" "-x!$repoName\MRC-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: MRC-windows-x64
          path: MRC-windows-x64.zip
          compression-level: 0
